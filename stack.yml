# Olmeda Pet Studio — Docker Swarm stack (single-node)
# Deploy:  GIT_SHA=<sha> SITE_IMAGE=olmeda-site:<sha> docker stack deploy -c stack.yml olmeda --prune
#
# Pre-reqs on VPS (confirmed via recon):
#   - Overlay network `olmedaNet` exists
#   - Traefik running with cert resolver `letsencryptresolver` (HTTP-01)
#   - HTTP->HTTPS redirect already global on Traefik (entrypoints.web.http.redirections)
#   - Env file at /srv/olmeda/.env (mode 0600)
# Hostname: pet.alcgestao.com.br (DNS-only / grey cloud at Cloudflare for ACME)
version: "3.9"

services:
  site:
    image: ${SITE_IMAGE:-olmeda-site:latest}
    networks:
      - olmedaNet
    env_file:
      - /srv/olmeda/.env
    environment:
      - GIT_SHA=${GIT_SHA:-unknown}
      - NEXT_PUBLIC_SITE_URL=https://pet.alcgestao.com.br
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=olmedaNet"
        - "traefik.http.services.olmeda-site.loadbalancer.server.port=3000"
        - "traefik.http.services.olmeda-site.loadbalancer.healthcheck.path=/api/health"
        - "traefik.http.services.olmeda-site.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.routers.olmeda-site.rule=Host(`pet.alcgestao.com.br`)"
        - "traefik.http.routers.olmeda-site.entrypoints=websecure"
        - "traefik.http.routers.olmeda-site.tls=true"
        - "traefik.http.routers.olmeda-site.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.olmeda-site.service=olmeda-site"

networks:
  olmedaNet:
    external: true
